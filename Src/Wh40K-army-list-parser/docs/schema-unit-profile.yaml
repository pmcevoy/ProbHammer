# UnitProfile — annotated YAML schema
#
# A single UnitProfile carries both offensive and defensive data.
# Pairing.Attacker / Pairing.Defender are both UnitProfile; role is encoded by the field name,
# not a separate type. This avoids duplicating identity fields (name, faction, keywords, abilities).
#
# C# record defined in: src/Wh40kArmyEnricher.Contracts/SimulationProfiles.cs
# Serialised with YamlDotNet CamelCaseNamingConvention.

name: "Crusader Squad"           # Unit display name from army list
faction: "Black Templars"
modelCount: 20                   # Total models in the unit
keywords:                        # Unit-level keywords from BSData categoryLinks
  - INFANTRY
  - CORE
  - ADEPTUS ASTARTES
abilities:                       # Unit special rules from BSData; not yet consumed by sim
  - name: "Righteous Zeal"
    text: "..."
leadingAbilities:                # Abilities that start with "While this model is leading a unit"
  - name: "Rites of Battle"      # Displayed in the "While Leading" section of the unit card
    text: "..."
enhancements: []                 # Enhancement names from army list

# --- Offensive stats ---
rerolls:                         # Army/detachment-level re-roll auras; set per simulation run
  hitRerollOnes: false
  hitRerollAll: false
  woundRerollOnes: false
  woundRerollAll: false
criticalHitsOn: 6                # Normally 6; some abilities lower this
models:                          # One entry per distinct model type in the unit
  - modelName: "Sword Brother"
    count: 1
    weapons:
      - weaponName: "Hellforged weapons"
        type: Melee
        range: 0                 # Melee weapons use range: 0
        profiles:
          - variant: strike      # Derived from "➤ Hellforged weapons - strike"
            attacks: 4
            skill: 3
            strength: 8
            ap: -2               # Negative integer matching game value (AP -2 → ap: -2)
            damage: 2
            abilities:
              torrent: false
              blast: false
              melta: 0           # 0 = not present; integer = bonus damage within half range
              rapidFire: 0       # 0 = not present; integer = bonus attacks at half range
              sustainedHits: 0   # 0 = not present; integer = bonus hits on Critical Hit
              lethalHits: false
              devastatingWounds: false
              twinLinked: false
              anti: {}           # keyword -> criticalWoundThreshold map
          - variant: sweep       # Derived from "➤ Hellforged weapons - sweep"
            attacks: 8
            skill: 3
            strength: 6
            ap: -1
            damage: 1
            abilities:
              torrent: false
              blast: false
              melta: 0
              rapidFire: 0
              sustainedHits: 0
              lethalHits: false
              devastatingWounds: false
              twinLinked: false
              anti: {}
      - weaponName: "Pyre pistol"
        type: Ranged
        range: 12
        profiles:
          - variant: default
            attacks: "D6"        # Variable attacks stored as string when not a fixed integer
            skill: 3
            strength: 4
            ap: 0
            damage: 1
            abilities:
              torrent: true      # Torrent: auto-hits, skip hit roll entirely
              blast: false
              melta: 0
              rapidFire: 0
              sustainedHits: 0
              lethalHits: false
              devastatingWounds: false
              twinLinked: false
              anti: {}

# --- Defensive stats ---
toughness: 4
save: 3                          # Raw integer; implies 3+
invulnerableSave: null           # null if absent; integer if present (e.g. 4 means 4++)
wounds: 2                        # Wounds per model
feelNoPain: null                 # null if absent; integer if present (e.g. 5 means 5+++)
