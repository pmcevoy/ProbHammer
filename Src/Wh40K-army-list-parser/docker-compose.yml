services:
  web:
    build:
      context: .
      dockerfile: src/Wh40kArmyEnricher.Web/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - Enricher__CachePath=/root/.wh40k-enricher/cache
    volumes:
      - catalogue-cache:/root/.wh40k-enricher/cache

volumes:
  catalogue-cache:
